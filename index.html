<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Пазл с таблицей умножения</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="setup" data-screen="setup" aria-labelledby="setupTitle">
        <div class="setup__content">
          <p class="eyebrow">Математический пазл</p>
          <h1 id="setupTitle">Открой картинку, решая примеры</h1>
          <p class="intro">Выбери размер поля, а потом открывай плитки правильными ответами из таблицы умножения.</p>

          <div class="controls" aria-label="Настройка поля">
            <label class="range-control" for="rows">
              <span>Строки: <strong id="rowsValue">4</strong></span>
              <input id="rows" type="range" min="3" max="9" value="4">
            </label>

            <label class="range-control" for="cols">
              <span>Столбцы: <strong id="colsValue">4</strong></span>
              <input id="cols" type="range" min="3" max="18" value="4">
            </label>

            <div class="summary" aria-live="polite">
              <span>Всего примеров</span>
              <strong id="tileCount">16</strong>
            </div>
          </div>

          <button class="button button--primary" id="startGame" type="button">Начать игру</button>
        </div>
      </section>

      <section class="game" data-screen="game" hidden aria-labelledby="gameTitle">
        <header class="game__header">
          <div>
            <p class="eyebrow">Собери картинку</p>
            <h2 id="gameTitle">Таблица умножения</h2>
          </div>

          <div class="game__actions">
            <div class="progress" aria-live="polite">
              <span>Открыто</span>
              <strong id="progress">0 из 16</strong>
            </div>
            <button class="button button--ghost" id="changeSize" type="button">Размер</button>
            <button class="button button--primary" id="restartGame" type="button">Перезапуск</button>
          </div>
        </header>

        <p class="status" id="status" aria-live="polite">Выбери пример, реши его и открой часть картинки.</p>
        <div class="board" id="board" aria-label="Игровое поле"></div>
      </section>
    </main>

    <dialog class="modal" id="answerModal" aria-labelledby="modalTitle">
      <form class="modal__panel" id="answerForm" method="dialog">
        <button class="modal__close" id="closeModal" type="button" aria-label="Закрыть окно">×</button>
        <p class="eyebrow">Реши пример</p>
        <h2 class="modal__problem" id="modalTitle"><span id="modalProblem">2 × 2</span></h2>

        <label class="answer-label" for="answerInput">Ответ</label>
        <input id="answerInput" class="answer-input" type="number" inputmode="numeric" autocomplete="off" required>
        <p class="feedback" id="feedback" aria-live="assertive"></p>

        <button class="button button--primary button--wide" type="submit">дать ответ</button>
      </form>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
